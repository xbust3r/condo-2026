version: '3'
services:
  backend:
    environment:
      EXCLUDE_PORTS: 443
      VIRTUAL_HOST: ${PROJECT_DOMAIN}
      AWS_REGION: ${AWS_REGION}
    volumes:
      - ./src:/app
      - $HOME/.aws:/root/.aws
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.condo-py.rule=Host(`${PROJECT_DOMAIN}`)"
      - "traefik.http.services.condo-py.loadbalancer.server.port=7415"
